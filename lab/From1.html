
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Form</title>
</head>
<body>

    <form method="post">
        
            <legend>Donor Information</legend>

            <table>

                <tr>
                    <td> <label for="fname">First Name*</label></td>
                    <td><input type="text" id="fname" name="fname" required></td>
                </tr>

                <tr>
                    <td><label for="lname">Last Name*</label></td>
                    <td><input type="text" id="lname" name="lname" required></td>
                </tr>

                <tr>
                    <td><label for="company">Company:</label></td>
                    <td><input type="text" id="company" name="company"></td>
                </tr>

                <tr>
                    <td><label for="address1">Address 1*</label></td>
                    <td><input type="text" id="address1" name="address1" required></td>
                </tr>

                <tr>
                    <td><label for="address2">Address 2*</label></td>
                    <td><input type="text" id="address2" name="address2"></td>
                </tr>

                <tr>
                    <td><label for="city">City*</label></td>
                    <td><input type="text" id="city" name="city" required></td>
                </tr>

                <tr>
                    <td><label for="state">State*</label></td>
                    <td>
                        <select id="state" name="state">
                            <option>Select a State</option>
                            <option>A</option>
                            <option>B</option>
                            <option>C</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="zip">Zip Code*</label></td>
                    <td><input type="text" id="zip" name="zip" required></td>
                </tr>

                <tr>
                    <td><label for="country">Country*</label></td>
                    <td>
                        <select id="country" name="country">
                            <option>Select a Country</option>
                            <option>Bangladesh</option>
                            <option>UAE</option>
                            <option>Uganda</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="phone">Phone</label></td>
                    <td><input type="tel" id="phone" name="phone"></td>
                </tr>

                <tr>
                    <td><label for="fax">Fax</label></td>
                    <td><input type="text" id="fax" name="fax"></td>
                </tr>

                <tr>
                    <td><label for="email">Email*</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>

                <tr>
                    <td><label>Donation Amount*</label></td>
                    <td>
                        <input type="radio" name="amount" value="none"> None
                        <input type="radio" name="amount" value="50"> $50
                        <input type="radio" name="amount" value="75"> $75
                        <input type="radio" name="amount" value="100"> $100
                        <input type="radio" name="amount" value="250"> $250
                        <input type="radio" name="amount" value="other"> Other
						
                    </td>
                </tr>
				

    
                <tr>
                    <td>
                    <label>(check a button or type in your amount)</label></td>
                </tr>
				

				
				  
				   <tr>
                         <td> </td>
						 <td>
                            <label for="other">Other Amount $</label>
                            <input type="text" id="other" name="other">
                         </td>
                   </tr>
                    
                <tr>
                    <td><label>Recurring Donation</label></td>
                    <td>
                        <input type="checkbox" >I am interested in giving on a regular basis 
                        
                    </td>
                </tr>

                <tr>
                    <td>(Check if yes)</td>
                    
                </tr>

                <tr>
                    <td></td>
                    <td>Monthly Credit Card $<input type="text"> For <input type="text"></td>
                </tr>

               

            </table>

       
    </form>

</body>
</html>
