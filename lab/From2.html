<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <div class="form">
            <h1>Registration</h1>

            <div class="box">
                <label>Full Name:</label>
                <input type="text" placeholder="fahim">
            </div>

            <div class="box">
                <label>Postal Code:</label>
                <input type="text" placeholder="11220">
            </div>

            <div class="box">
                <label>Date of Birth:</label>
                <input type="date" placeholder="08/10/2000">
            </div>

            <div class="box">
                <label>Email Address:</label>
                <input type="email" placeholder="fahim1@gmail.com">
            </div>

            <div class="box">
                <label>Password:</label>
                <input type="password" placeholder="********">
            </div>

            <div class="box">
                <label>Country:</label>
                <select>
                    <option>Select Country</option>
                    <option>India</option>
                    <option>USA</option>
                    <option>Canada</option>
                </select>
            </div>

            <div class="button">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </div>
    </form>
</body>

</html>
